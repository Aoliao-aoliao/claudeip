<script type="401908282830a6eada592545-text/javascript">
(function() {
  const STATUS_URL = '/claude/status.json';

  const statusColor = {
    'none': 'ok', 'operational': 'ok',
    'degraded_performance': 'warn', 'partial_outage': 'warn',
    'major_outage': 'bad', 'under_maintenance': 'warn',
  };

  const impactTag = {
    'none': 'tag-none', 'minor': 'tag-minor',
    'major': 'tag-major', 'critical': 'tag-major',
    'maintenance': 'tag-maintenance',
  };

  const impactCn = {
    'none': '无影响', 'minor': '轻微影响',
    'major': '重大影响', 'critical': '严重影响',
    'maintenance': '维护',
  };

  const statusCn = {
    'investigating': '调查中', 'identified': '已定位',
    'monitoring': '监控中', 'resolved': '已解决',
    'postmortem': '复盘中', 'scheduled': '计划中',
    'in_progress': '进行中', 'completed': '已完成',
  };

  function formatTime(iso) {
    if (!iso) return '';
    try {
      const d = new Date(iso);
      const pad = n => String(n).padStart(2, '0');
      const tz = -d.getTimezoneOffset() / 60;
      const tzStr = tz >= 0 ? `UTC+${tz}` : `UTC${tz}`;
      return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())} ${pad(d.getHours())}:${pad(d.getMinutes())} (${tzStr})`;
    } catch { return iso; }
  }

  function render(data) {
    // Overall
    const el = document.getElementById('overall');
    const ind = data.overall_indicator || 'none';
    const color = statusColor[ind] || 'warn';
    el.className = `overall-card overall-${color}`;
    el.innerHTML = `
      <div class="overall-dot dot-${color}"></div>
      <div>
        <div class="overall-text">${data.overall}</div>
        <div class="overall-time">更新于 ${formatTime(data.fetched_at)}</div>
      </div>
    `;

    // Components
    const compEl = document.getElementById('components');
    if (data.components && data.components.length) {
      compEl.innerHTML = data.components.map(c => {
        const cc = statusColor[c.status] || 'warn';
        return `<div class="comp-card">
          <div class="comp-name">${c.name}</div>
          <div class="comp-status"><div class="comp-dot dot-${cc}"></div>${c.status_cn}</div>
        </div>`;
      }).join('');
    } else {
      compEl.innerHTML = '<div class="comp-card"><div class="comp-name">暂无数据</div></div>';
    }

    // Incidents
    const incEl = document.getElementById('incidents');
    if (data.incidents && data.incidents.length) {
      incEl.innerHTML = data.incidents.map(inc => {
        const tagClass = impactTag[inc.impact] || 'tag-minor';
        const tagText = impactCn[inc.impact] || inc.impact;
        const st = statusCn[inc.status] || inc.status;
        const stClass = inc.status === 'resolved' ? 'incident-tag tag-resolved' : '';
        return `<div class="incident-card">
          <div class="incident-name">${inc.name}</div>
          <div class="incident-meta">
            <span class="incident-tag ${tagClass}">${tagText}</span>
            <span class="${stClass}">${st}</span>
            <span>${formatTime(inc.updated_at || inc.created_at)}</span>
          </div>
        </div>`;
      }).join('');
    } else {
      incEl.innerHTML = '<div class="no-incidents">近期无事件，一切正常运行</div>';
    }
  }

  fetch(STATUS_URL)
    .then(r => r.json())
    .then(render)
    .catch(() => {
      document.getElementById('overall').innerHTML = `
        <div class="overall-dot dot-loading"></div>
        <div><div class="overall-text">数据暂不可用</div>
        <div class="overall-time">请稍后刷新</div></div>
      `;
      document.getElementById('components').innerHTML = '';
      document.getElementById('incidents').innerHTML = '<div class="no-incidents">无法加载状态数据</div>';
    });
})();
</script>
