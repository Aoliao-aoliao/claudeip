<script>
(function(){
  var _gc={}, _of=window.fetch.bind(window);
  window.fetch=async function(url,opts){
    var u=typeof url==='string'?url:'';

    if(u.indexOf('/api/geoip/')>=0){
      var ip=u.replace(/.*\/api\/geoip\//,'').split('?')[0].split('/')[0];
      if(_gc[ip]) return new Response(JSON.stringify(_gc[ip]),{status:200,headers:{'Content-Type':'application/json'}});
      try{
        var r=await _of('https://dnsip.adbog.com/api/geoip/'+ip,{signal:AbortSignal.timeout(6000)});
        var d=await r.json();
        if(d.country){_gc[ip]=d;return new Response(JSON.stringify(d),{status:200,headers:{'Content-Type':'application/json'}});}
      }catch(e){}
      try{
        var r=await _of('https://ipwho.is/'+ip,{signal:AbortSignal.timeout(6000)});
        var d=await r.json();
        if(d.success&&d.country){
          var cn=d.connection||{};
          var res={country:d.country||'',region:d.region||'',city:d.city||'',isp:cn.isp||cn.org||'',country_code:(d.country_code||'').toLowerCase(),asn:cn.asn?'AS'+cn.asn:'',asOrganization:cn.isp||cn.org||''};
          _gc[ip]=res;
          return new Response(JSON.stringify(res),{status:200,headers:{'Content-Type':'application/json'}});
        }
      }catch(e2){}
      return new Response('{}',{status:404,headers:{'Content-Type':'application/json'}});
    }

    if(u.indexOf('/api/iprisk/')>=0){
      var ip3=u.replace(/.*\/api\/iprisk\//,'').split('?')[0].split('/')[0];
      try{
        var rv=await _of('https://dnsip.adbog.com/api/iprisk/'+ip3,{signal:AbortSignal.timeout(8000)});
        var dv=await rv.json();
        if(dv.asOrganization!==undefined||dv.country){return new Response(JSON.stringify(dv),{status:200,headers:{'Content-Type':'application/json'}});}
      }catch(ev){}
      var cached=_gc[ip3];
      var risk={ip:ip3,asn:cached&&cached.asn?parseInt((cached.asn||'').replace('AS','')):0,asOrganization:cached&&(cached.asOrganization||cached.isp)||'',country:cached&&cached.country||'',countryCode:cached&&cached.country_code||'',region:cached&&cached.region||'',city:cached&&cached.city||'',isResidential:null,isBroadcast:null,is_datacenter:null,is_vpn:null,is_proxy:null,is_tor:null,is_crawler:null,is_abuser:null,is_mobile:null,company_type:'',company_name:cached&&(cached.asOrganization||cached.isp)||'',abuser_score:null,datacenter_name:''};
      return new Response(JSON.stringify(risk),{status:200,headers:{'Content-Type':'application/json'}});
    }

    if(u.indexOf('/api/dns/result/')>=0){
      var token=u.split('/api/dns/result/')[1];
      try{return await _of('https://dnsip.adbog.com/api/dns/result/'+token);}catch(ed){}
      return new Response(JSON.stringify({success:true,dns_servers:[]}),{status:200,headers:{'Content-Type':'application/json'}});
    }

    return _of(url,opts);
  };
})();

<script>

  { id: 'vn1.node.check-host.net', name: '越南胡志明', cc: 'vn', city: 'Ho Chi Minh City', continent: '亚洲', cIcon: '🌏' },

  { id: 'ae1.node.check-host.net', name: '阿联酋迪拜', cc: 'ae', city: 'Dubai', continent: '亚洲', cIcon: '🌏' },
  // Americas
  { id: 'us1.node.check-host.net', name: '美国洛杉矶', cc: 'us', city: 'Los Angeles', continent: '美洲', cIcon: '🌎' },
  { id: 'us3.node.check-host.net', name: '美国亚特兰大', cc: 'us', city: 'Atlanta', continent: '美洲', cIcon: '🌎' },
  { id: 'ca1.node.check-host.net', name: '加拿大温哥华', cc: 'ca', city: 'Vancouver', continent: '美洲', cIcon: '🌎' },
  { id: 'br1.node.check-host.net', name: '巴西圣保罗', cc: 'br', city: 'Sao Paulo', continent: '美洲', cIcon: '🌎' },
  // Europe
  { id: 'de4.node.check-host.net', name: '德国法兰克福', cc: 'de', city: 'Frankfurt', continent: '欧洲', cIcon: '🌍' },
  { id: 'nl1.node.check-host.net', name: '荷兰阿姆斯特丹', cc: 'nl', city: 'Amsterdam', continent: '欧洲', cIcon: '🌍' },
  { id: 'fr2.node.check-host.net', name: '法国巴黎', cc: 'fr', city: 'Paris', continent: '欧洲', cIcon: '🌍' },
  { id: 'se1.node.check-host.net', name: '瑞典斯德哥尔摩', cc: 'se', city: 'Stockholm', continent: '欧洲', cIcon: '🌍' },
  { id: 'ch1.node.check-host.net', name: '瑞士苏黎世', cc: 'ch', city: 'Zurich', continent: '欧洲', cIcon: '🌍' },
  { id: 'es1.node.check-host.net', name: '西班牙马德里', cc: 'es', city: 'Madrid', continent: '欧洲', cIcon: '🌍' },
  { id: 'ru1.node.check-host.net', name: '俄罗斯莫斯科', cc: 'ru', city: 'Moscow', continent: '欧洲', cIcon: '🌍' },
  { id: 'tr1.node.check-host.net', name: '土耳其伊斯坦布尔', cc: 'tr', city: 'Istanbul', continent: '欧洲', cIcon: '🌍' },
];

function flagImg(cc) {
  const src = cc === 'cn' ? '/favicons/cn.png' : `https://flagcdn.com/w40/${cc}.png`;
  return `<img src="${src}" alt="${cc}">`;
}

function pingClass(ms) {
  if (ms < 100) return 'ping-ok';
  if (ms < 200) return 'ping-med';
  if (ms < 350) return 'ping-slow';
  return 'ping-bad';
}


function renderTable() {
  const tbody = document.getElementById('resultsBody');
  let lastContinent = '';
  tbody.innerHTML = NODES.map((n, i) => {
    let sep = '';
    if (n.continent !== lastContinent) {
      lastContinent = n.continent;
      sep = `<tr class="continent-row"><td colspan="4">${n.cIcon} ${n.continent}</td></tr>`;
    }
    return `${sep}<tr id="row-${i}">
      <td><div class="node-cell">${flagImg(n.cc)} ${n.name}<span class="node-city" style="color:#8b949e;font-size:0.82em;margin-left:4px">${n.city}</span></div></td>
      <td class="ping-val ping-wait" id="min-${i}">--</td>
      <td class="ping-val ping-wait" id="avg-${i}">--</td>
      <td class="ping-val ping-wait" id="max-${i}">--</td>
    </tr>`;
  }).join('');
}

function showLoading() {
  NODES.forEach((_, i) => {
    document.getElementById(`min-${i}`).className = 'ping-val ping-wait';
    document.getElementById(`min-${i}`).innerHTML = '<div class="loading-bar" style="width:36px"></div>';
    document.getElementById(`avg-${i}`).innerHTML = '<div class="loading-bar" style="width:36px"></div>';
    document.getElementById(`max-${i}`).innerHTML = '<div class="loading-bar" style="width:36px"></div>';
  });
}

function updateRow(index, data) {
  // data is array of [["OK", latency_sec, ip?], ...] or null
  if (!data || !data[0]) {
    document.getElementById(`min-${index}`).innerHTML = '<span class="ping-err">超时</span>';
    document.getElementById(`avg-${index}`).textContent = '--';
    document.getElementById(`max-${index}`).textContent = '--';
    return;
  }

  const pings = data[0];
  const times = pings.filter(p => p[0] === 'OK').map(p => Math.round(p[1] * 1000));

  if (times.length === 0) {
    document.getElementById(`min-${index}`).innerHTML = '<span class="ping-err">不可达</span>';
    document.getElementById(`avg-${index}`).textContent = '--';
    document.getElementById(`max-${index}`).textContent = '--';
    return;
  }

  const min = Math.min(...times);
  const max = Math.max(...times);
  const avg = Math.round(times.reduce((a, b) => a + b, 0) / times.length);

  const cls = pingClass(avg);
  document.getElementById(`min-${index}`).className = `ping-val ${cls}`;
  document.getElementById(`min-${index}`).textContent = min + ' ms';
  document.getElementById(`avg-${index}`).className = `ping-val ping-avg ${cls}`;
  document.getElementById(`avg-${index}`).textContent = avg + ' ms';
  document.getElementById(`max-${index}`).className = `ping-val ${cls}`;
  document.getElementById(`max-${index}`).textContent = max + ' ms';
}

let polling = false;

async function startPing() {
  const host = document.getElementById('hostInput').value.trim();
  if (!host) return;
  if (polling) return;

  const btn = document.getElementById('pingBtn');
  btn.disabled = true;
  btn.textContent = '检测中...';
  polling = true;
  showLoading();

  try {
    // Build node filter
    const nodeParam = NODES.map(n => `node=${n.id}`).join('&');
    // Get user IP for rate limiting
    let userIp = 'unknown';
    try {
      const tr = await fetch('https://1.1.1.1/cdn-cgi/trace', { signal: AbortSignal.timeout(3000) });
      const txt = await tr.text();
      const m = txt.match(/ip=([^\n]+)/);
      if (m) userIp = m[1].trim();
    } catch {}

    const url = `/api/ping/start?host=${encodeURIComponent(host)}&user_ip=${encodeURIComponent(userIp)}&${nodeParam}`;
    const resp = await fetch(url, { signal: AbortSignal.timeout(15000) });
    const data = await resp.json();

    // Rate limited?
    if (data.error) {
      NODES.forEach((_, i) => {
        document.getElementById(`status-${i}`).innerHTML = `<span class="ping-err">${data.error}</span>`;
        document.getElementById(`min-${i}`).textContent = '--';
        document.getElementById(`avg-${i}`).textContent = '--';
        document.getElementById(`max-${i}`).textContent = '--';
      });
      return;
    }

    // Cached result from server?
    if (data.cached) {
      const results = data.results;
      NODES.forEach((n, i) => { if (results[n.id]) updateRow(i, results[n.id]); });
      return;
    }

    const requestId = data.request_id;
    if (!requestId) throw new Error('No request ID');

    // Poll for results (max 15 seconds)
    let attempts = 0;
    const maxAttempts = 10;

    const poll = async () => {
      attempts++;
      await new Promise(r => setTimeout(r, 1500));

      const rResp = await fetch(`/api/ping/result/${requestId}`, { signal: AbortSignal.timeout(10000) });
      const results = await rResp.json();

      let allDone = true;
      NODES.forEach((n, i) => {
        const nodeData = results[n.id];
        if (nodeData) {
          updateRow(i, nodeData);
        } else {
          allDone = false;
        }
      });

      if (!allDone && attempts < maxAttempts) {
        await poll();
      }
    };

    await poll();

  } catch (e) {
    NODES.forEach((_, i) => {
      const st = document.getElementById(`status-${i}`);
      if (st.querySelector('.loading-bar')) {
        st.innerHTML = '<span class="ping-err">请求失败</span>';
      }
    });
  } finally {
    polling = false;
    btn.disabled = false;
    btn.textContent = 'Ping';
  }
}

// Auto-fill Cloudflare IP on load
async function init() {
  renderTable();
  try {
    const r = await fetch('https://1.1.1.1/cdn-cgi/trace', { signal: AbortSignal.timeout(5000) });
    const txt = await r.text();
    const m = txt.match(/ip=([^\n]+)/);
    if (m) {
      document.getElementById('hostInput').value = m[1].trim();
    }
  } catch {}
}

init();

// Enter key triggers ping
document.getElementById('hostInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') startPing();
});
</script>
